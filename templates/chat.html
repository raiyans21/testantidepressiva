<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Chat Room</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>

    <!-- Bootstrap CSS für allgemeines Styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Link zu allgemeinem Custom CSS -->
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/header.css">

    <style>
        .popup-menu {
            position: absolute;
            display: none;
            background: white;
            border: 1px solid #ddd;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
            padding: 10px;
        }

        .message {
            margin-bottom: 10px;
        }

        .reply {
            font-size: 12px;
            color: gray;
            margin-bottom: 5px;
        }

        .time {
            font-size: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Include Header -->
    {% include 'header.html' %}

    <h2>Chat Room</h2>
    <input type="color" id="colorPicker" value="{{ current_user.color }}"> <!-- Farbauswahl -->
    <div id="messages"></div>
    <div>
        <input id="message_input" type="text" placeholder="Nachricht eingeben..." autocomplete="off">
        <button id="send_button">Senden</button>
    </div>
    <p id="reply_info" style="font-size: 12px; color: gray;"></p> <!-- Bereich zum Anzeigen der Antwort -->

    <div id="popupMenu" class="popup-menu"></div> <!-- Popup-Menü -->

    <script>
        const socket = io();
        const username = "{{ current_user.username }}"; // Benutzernamen von Flask abrufen

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message_input');
        const sendButton = document.getElementById('send_button');
        const colorPicker = document.getElementById('colorPicker');
        const replyInfo = document.getElementById('reply_info'); // Für die Antwortanzeige
        const popupMenu = document.getElementById('popupMenu'); // Popup-Menü

        let mutedUsers = [];  // Liste der stummgeschalteten Benutzer
        let replyingTo = null;  // Referenz auf die Nachricht, auf die geantwortet wird

        // Funktion zum Senden der Nachricht
        function sendMessage() {
            const message = messageInput.value;
            const color = colorPicker.value; // Die aktuell ausgewählte Farbe

            if (message) {
                // Sende Nachricht, Benutzernamen, Farbe und die ursprüngliche Nachricht (wenn es eine Antwort gibt)
                socket.emit('send_message', {
                    msg: message,
                    username: username,
                    color: color,
                    replyTo: replyingTo  // Antwort-Referenz senden
                });

                // Antwortinfo löschen und Eingabe zurücksetzen
                replyingTo = null;
                replyInfo.textContent = '';
                messageInput.value = '';  // Nachrichtenfeld leeren
            }
        }

        // Event-Listener für den Button "Senden"
        sendButton.onclick = function () {
            sendMessage();
        };

        // Event-Listener für die Enter-Taste im Nachrichten-Eingabefeld
        messageInput.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        });

        // Funktion zum Setzen der Antwort auf eine Nachricht
        function setReplyToMessage(messageText) {
            replyingTo = messageText;  // Speichert die Nachricht, auf die geantwortet wird
            replyInfo.innerHTML = `Antworten auf: "${messageText}" <span onclick="clearReply()" style="color: red; cursor: pointer;">X</span>`;
        }

        // Funktion zum Löschen der Antwort
        function clearReply() {
            replyingTo = null;
            replyInfo.textContent = '';  // Antwortinfo löschen
        }

        // Funktion zum Anzeigen des Popup-Menüs
        function showPopup(event, username) {
            const x = event.clientX; // Maus-X-Position
            const y = event.clientY; // Maus-Y-Position
            popupMenu.style.display = 'block';
            popupMenu.style.left = `${x}px`;
            popupMenu.style.top = `${y}px`;

            popupMenu.innerHTML = `
                <button onclick="toggleMuteUser('${username}')">Stummschalten/Entstummschalten</button>
            `;
        }

        // Funktion zum Stummschalten oder Entstummschalten von Benutzern
        function toggleMuteUser(username) {
            if (mutedUsers.includes(username)) {
                mutedUsers = mutedUsers.filter(user => user !== username);
                alert(`${username} wurde entstummt.`);
            } else {
                mutedUsers.push(username);
                alert(`${username} wurde stummgeschaltet.`);
            }
            closePopup();
        }

        // Funktion zum Schließen des Popups
        function closePopup() {
            popupMenu.style.display = 'none';
        }

        // Empfang von Nachrichten
        socket.on('receive_message', function (data) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');

            if (!mutedUsers.includes(data.username)) {
                messageElement.innerHTML = `
                    <span>
                        ${data.replyTo ? `<div class="reply">Antwort auf: ${data.replyTo}</div>` : ''}
                        <span class="username" style="color: ${data.color}">${data.username}</span>: ${data.msg}
                    </span>
                    <span class="time">${data.time}</span>
                `;

                messageElement.querySelector('.username').onclick = function (event) {
                    event.stopPropagation();
                    showPopup(event, data.username);
                };

                messagesDiv.appendChild(messageElement);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        });
    </script>
</body>
</html>
